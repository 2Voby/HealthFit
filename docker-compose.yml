services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: users_api
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_EXTERNAL_PORT:-18247}:8000"
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: users_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-15429}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: users_redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-16371}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  admin_front:
    build:
      context: ./admin_front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:18247}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:18247}
    container_name: users_admin_front
    depends_on:
      - api
    ports:
      - "${ADMIN_FRONT_EXTERNAL_PORT:-3000}:80"
    restart: unless-stopped

  client_front:
    build:
      context: ./client_front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:18247}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:18247}
    container_name: users_client_front
    depends_on:
      - api
    ports:
      - "${CLIENT_FRONT_EXTERNAL_PORT:-3001}:80"
    restart: unless-stopped

  tests:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: users_tests
    profiles: ["test"]
    env_file:
      - ./.env
    environment:
      BOOTSTRAP_MOCK_DATA: "false"
      PYTHONPATH: /app
      POSTGRES_HOST: postgres_test
      REDIS_HOST: redis_test
    working_dir: /app
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["pytest", "-q", "tests"]

  postgres_test:
    image: postgres:16-alpine
    container_name: users_postgres_test
    profiles: ["test"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_TEST_EXTERNAL_PORT:-15439}:5432"
    volumes:
      - pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis_test:
    image: redis:7-alpine
    container_name: users_redis_test
    profiles: ["test"]
    ports:
      - "${REDIS_TEST_EXTERNAL_PORT:-16381}:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  pg_test_data:
  redis_test_data:
